<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Add Transaction | Vault</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-primary-fixed-variant": "#0040a1",
              "primary": "#0040a1",
              "on-tertiary-fixed-variant": "#2e2bc2",
              "on-background": "#191b23",
              "outline": "#737785",
              "tertiary-fixed-dim": "#c1c1ff",
              "tertiary-container": "#4849da",
              "on-surface": "#191b23",
              "tertiary": "#2e2bc2",
              "surface-container": "#ededf8",
              "on-tertiary": "#ffffff",
              "primary-fixed": "#dae2ff",
              "on-secondary-fixed": "#00201b",
              "on-surface-variant": "#424654",
              "surface": "#faf8ff",
              "secondary-fixed-dim": "#83d5c5",
              "secondary-fixed": "#9ff2e1",
              "on-error": "#ffffff",
              "error": "#ba1a1a",
              "outline-variant": "#c3c6d6",
              "surface-container-highest": "#e1e2ec",
              "on-secondary-fixed-variant": "#005046",
              "on-error-container": "#93000a",
              "secondary": "#006b5e",
              "primary-container": "#0056d2",
              "on-tertiary-fixed": "#07006c",
              "primary-fixed-dim": "#b2c5ff",
              "on-tertiary-container": "#d6d5ff",
              "on-secondary-container": "#0b6f62",
              "surface-container-lowest": "#ffffff",
              "on-primary": "#ffffff",
              "background": "#faf8ff",
              "secondary-container": "#9cefde",
              "on-primary-container": "#ccd8ff",
              "surface-container-low": "#f2f3fe",
              "inverse-surface": "#2e3038",
              "on-primary-fixed": "#001847",
              "surface-tint": "#0056d2",
              "surface-variant": "#e1e2ec",
              "surface-dim": "#d9d9e4",
              "inverse-on-surface": "#f0f0fb",
              "on-secondary": "#ffffff",
              "surface-bright": "#faf8ff",
              "surface-container-high": "#e7e7f2",
              "tertiary-fixed": "#e1e0ff",
              "error-container": "#ffdad6",
              "inverse-primary": "#b2c5ff"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      body { font-family: 'Inter', sans-serif; }
      h1, h2, h3 { font-family: 'Manrope', sans-serif; }
    </style>
</head>
<body class="bg-surface text-on-surface min-h-screen">
<!-- Side Navigation (Suppressed for focused task: Add Transaction) -->
<!-- Using TopNavBar with "Close" intent as per UX Goal rules -->
<nav class="bg-slate-50/70 dark:bg-slate-950/70 backdrop-blur-xl docked full-width top-0 sticky z-50 flex justify-between items-center w-full px-6 py-4">
<div class="flex items-center gap-4">
<div class="text-2xl font-bold tracking-tight text-blue-800 dark:text-blue-300">Vault</div>
<div class="h-6 w-px bg-outline-variant/30 mx-2"></div>
<div class="flex items-center gap-2 text-slate-500">
<span class="material-symbols-outlined text-sm">edit_note</span>
<span class="font-body text-sm font-medium">New Entry</span>
</div>
</div>
<div class="flex items-center gap-4">
<button class="text-slate-500 hover:text-primary transition-colors flex items-center gap-1">
<span class="material-symbols-outlined">close</span>
<span class="text-sm font-medium">Cancel</span>
</button>
</div>
</nav>
<main class="max-w-5xl mx-auto px-6 py-12">
<!-- Header Section -->
<header class="mb-12">
<h1 class="text-5xl font-extrabold tracking-tight text-on-surface mb-2">Add Transaction</h1>
<p class="text-on-surface-variant font-body">Create a detailed record for your editorial vault.</p>
</header>
<div class="grid grid-cols-1 lg:grid-cols-12 gap-12">
<!-- Main Form Column -->
<div class="lg:col-span-7 space-y-10">
<!-- Mode Selector -->
<div class="inline-flex p-1 bg-surface-container rounded-full">
<button class="px-8 py-2.5 rounded-full bg-surface-container-lowest text-primary font-bold text-sm transition-all shadow-sm">Expense</button>
<button class="px-8 py-2.5 rounded-full text-on-surface-variant font-medium text-sm hover:text-primary transition-all">Income</button>
<button class="px-8 py-2.5 rounded-full text-on-surface-variant font-medium text-sm hover:text-primary transition-all">Transfer</button>
</div>
<!-- Amount Input (The Statement) -->
<div class="space-y-4">
<label class="block text-xs font-bold uppercase tracking-widest text-outline">Amount (IDR)</label>
<div class="relative flex items-baseline">
<span class="text-4xl font-manrope font-bold text-primary mr-3">Rp</span>
<input class="w-full text-7xl font-manrope font-extrabold bg-transparent border-none focus:ring-0 p-0 placeholder-surface-container-highest text-on-surface" placeholder="0" type="text"/>
</div>
<div class="h-px w-full bg-surface-container-highest"></div>
</div>
<!-- Details Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-8">
<div class="md:col-span-2 space-y-2">
<label class="block text-sm font-semibold text-on-surface">Transaction Name</label>
<input class="w-full bg-surface-container-low border-none rounded-xl px-4 py-4 focus:ring-2 focus:ring-primary/20 text-on-surface font-body transition-all" placeholder="e.g. Weekly Grocery at Alfamart" type="text"/>
</div>
<div class="space-y-2">
<label class="block text-sm font-semibold text-on-surface">Date &amp; Time</label>
<div class="relative">
<input class="w-full bg-surface-container-low border-none rounded-xl px-4 py-4 focus:ring-2 focus:ring-primary/20 text-on-surface font-body transition-all" type="datetime-local"/>
</div>
</div>
<div class="space-y-2">
<label class="block text-sm font-semibold text-on-surface">Category</label>
<div class="relative">
<select class="w-full bg-surface-container-low border-none rounded-xl px-4 py-4 appearance-none focus:ring-2 focus:ring-primary/20 text-on-surface font-body transition-all">
<option>Food &amp; Beverage</option>
<option>Transport (Grab/Gojek)</option>
<option>Utilities</option>
<option>Entertainment</option>
<option>Shopping (Tokopedia)</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-outline">expand_more</span>
</div>
</div>
</div>
<!-- Source Account Selector -->
<div class="space-y-4">
<label class="block text-sm font-semibold text-on-surface">Source Account</label>
<div class="grid grid-cols-2 sm:grid-cols-4 gap-3">
<button class="flex flex-col items-start p-4 bg-surface-container-lowest border-2 border-primary rounded-xl transition-all">
<span class="material-symbols-outlined text-primary mb-2">account_balance</span>
<span class="text-xs font-bold text-on-surface">BNI Salary</span>
<span class="text-[10px] text-outline">Main</span>
</button>
<button class="flex flex-col items-start p-4 bg-surface-container-low border-2 border-transparent hover:border-surface-container-highest rounded-xl transition-all">
<span class="material-symbols-outlined text-outline mb-2">account_balance_wallet</span>
<span class="text-xs font-bold text-on-surface">GoPay Global</span>
<span class="text-[10px] text-outline">E-Wallet</span>
</button>
<button class="flex flex-col items-start p-4 bg-surface-container-low border-2 border-transparent hover:border-surface-container-highest rounded-xl transition-all">
<span class="material-symbols-outlined text-outline mb-2">payments</span>
<span class="text-xs font-bold text-on-surface">Cash</span>
<span class="text-[10px] text-outline">Pocket</span>
</button>
<button class="flex flex-col items-center justify-center p-4 bg-surface-container-low border-2 border-dashed border-outline-variant/50 rounded-xl hover:bg-surface-container-high transition-all">
<span class="material-symbols-outlined text-outline">add</span>
</button>
</div>
</div>
</div>
<!-- Secondary/Advanced Column (Sticky-ish) -->
<div class="lg:col-span-5 space-y-8">
<div class="bg-surface-container-low rounded-xl p-8 space-y-8">
<h3 class="text-xl font-bold text-on-surface">Advanced Options</h3>
<!-- Split Bill Toggle -->
<div class="space-y-4">
<div class="flex justify-between items-center">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-tertiary">groups</span>
<span class="font-semibold text-on-surface">Split Bill</span>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input class="sr-only peer" type="checkbox"/>
<div class="w-11 h-6 bg-surface-container-highest peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
</label>
</div>
</div>
<div class="h-px bg-outline-variant/20"></div>
<!-- PayLater Toggle -->
<div class="space-y-4">
<div class="flex justify-between items-center">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-secondary">update</span>
<span class="font-semibold text-on-surface">PayLater / Accrual</span>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer" type="checkbox"/>
<div class="w-11 h-6 bg-surface-container-highest peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
</label>
</div>
<!-- Visible when checked -->
<div class="pl-9 space-y-4">
<div class="space-y-2">
<label class="block text-xs font-bold text-outline">Due Date</label>
<input class="w-full bg-surface-container-lowest border-none rounded-lg px-3 py-2 text-sm focus:ring-1 focus:ring-primary/20" type="date"/>
</div>
<p class="text-xs text-on-surface-variant italic">Recorded as GoPayLater debt</p>
</div>
</div>
<div class="h-px bg-outline-variant/20"></div>
<!-- Documentation -->
<div class="space-y-4">
<div class="space-y-2">
<label class="flex items-center gap-2 text-sm font-semibold text-on-surface">
<span class="material-symbols-outlined text-sm">notes</span> Memo
                        </label>
<textarea class="w-full bg-surface-container-lowest border-none rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-primary/20 min-h-[100px]" placeholder="Write a note..."></textarea>
</div>
<div class="space-y-2">
<label class="flex items-center gap-2 text-sm font-semibold text-on-surface">
<span class="material-symbols-outlined text-sm">receipt_long</span> Attachment
                        </label>
<div class="border-2 border-dashed border-outline-variant/40 rounded-xl p-6 flex flex-col items-center justify-center bg-surface-container-lowest hover:bg-surface-container-high transition-colors cursor-pointer group">
<span class="material-symbols-outlined text-outline group-hover:text-primary transition-colors text-3xl mb-2">add_a_photo</span>
<span class="text-xs font-medium text-outline">Upload Receipt or PDF</span>
</div>
</div>
</div>
</div>
<!-- Global Actions -->
<div class="space-y-3 pt-4">
<button class="w-full py-5 bg-gradient-to-r from-primary to-primary-container text-white rounded-full font-bold text-lg shadow-lg hover:shadow-primary/20 hover:scale-[1.01] transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined">save</span>
                    Save Transaction
                </button>
<div class="grid grid-cols-2 gap-3">
<button class="py-4 bg-surface-container-highest text-on-surface-variant rounded-full font-semibold text-sm hover:bg-surface-container-high transition-all">
                        Save &amp; New
                    </button>
<button class="py-4 bg-transparent text-outline rounded-full font-semibold text-sm hover:text-error transition-all">
                        Discard
                    </button>
</div>
</div>
</div>
</div>
</main>
<!-- Contextual Footer (Help only, no nav for focus) -->
<footer class="mt-24 py-12 border-t border-outline-variant/10">
<div class="max-w-5xl mx-auto px-6 flex justify-between items-center text-outline">
<div class="text-sm font-medium">Precision Finance © 2024</div>
<div class="flex gap-6">
<a class="text-sm hover:text-primary transition-colors" href="#">Documentation</a>
<a class="text-sm hover:text-primary transition-colors" href="#">Support</a>
</div>
</div>
</footer>
</body></html>
